<div class="dos" align="center">
<img id="principal"  src="pzzz.jpg"/>

<img id="img1" onmouseover="f()"  src="1.jpeg"/>
<img id="img2" onmouseover="f2()" src="2.jpg"/>
<img id="img3" onmouseover="f3()" src="3.jpg"/>
<img id="img4" onmouseover="f4()" src="4.jpg"/>

<script>
	function out(){
		var image = document.getElementById('principal');
		image.src = "pzzz.jpg";
	}
</script>
<script>
	function f(){
		var image = document.getElementById('principal');
		var over = document.getElementById('img1');
		
		if(over.src.match("1.jpeg"))
		{
			image.src = "1.jpeg";
		}
		else{
			image.src = "pzzz.jpg";
		}
	}
</script>
